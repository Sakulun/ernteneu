function renderSiloManagement() {
  const bigSilos = state.silos.filter(s=>s.kapazitaet_t>=1000).sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true}));
  const smallSilos = state.silos.filter(s=>s.kapazitaet_t<1000).sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true}));
  const unassigned = state.fuhren.filter(f=>f.status==='fertig'&&!f.siloId).sort((a,b)=>new Date(b.zeit)-new Date(a.zeit));
  const totalFertig = state.fuhren.filter(f=>f.status==='fertig').length;
  const totalAssigned = state.fuhren.filter(f=>f.status==='fertig'&&f.siloId).length;
  const view = _siloView; // 'B', 'A', or 'HOF'




  const sc = (s) => {
    const fillKg = getSiloFill(s.id);
    const fillT = fillKg/1000;
    const pct = Math.min(100,(fillT/s.kapazitaet_t)*100);
    const overfull = fillT > s.kapazitaet_t;
    const kultur = getSiloKultur(s.id);
    const isBig = s.kapazitaet_t >= 1000;
    const sz = isBig ? 150 : 110;
    const r = (sz/2)-9;
    const circ = 2*Math.PI*r;
    const hasFeuchteWarn = state.fuhren.filter(f=>f.siloId===s.id).some(feuchteZuHoch);
    const fc = overfull?'#ef4444':pct>85?'#e0943a':pct>0?'#4caf6e':'#2a422a';
    const active = _activeSiloId===s.id;
    const outerStroke = hasFeuchteWarn ? '#ef4444' : (active?'var(--gold)':'#2a422a');
    const sd = (pct/100*circ).toFixed(1)+' '+circ.toFixed(1);
    const cnt = state.fuhren.filter(f=>f.siloId===s.id).length;
    const kl = kultur ? kultur
      .replace('Winterweichweizen','W.Weizen').replace('Wintergerste','W.Gerste')
      .replace('Winterraps','W.Raps').replace('Wintertriticale','W.Triticale')
      .replace('Winterdurum','W.Durum').replace('Winter','W.').replace('Sommer','So.') : '';
    const siloIstBio = getSiloBioStatus(s.id) === 'bio';
    const strokeC = hasFeuchteWarn ? '#ef4444' : active ? 'var(--gold)' : siloIstBio ? '#16a34a' : '#2a422a';
    const strokeW = active ? 3 : 1.5;
    const fillBg = active ? '#e8f4e8' : '#f4f8f4';
    const pctText = pct>0 ? `<text x="${sz/2}" y="${sz/2+22}" text-anchor="middle" fill="#6a6a6a" font-size="${isBig?11:9}" font-family="monospace">${pct.toFixed(0)}%</text>` : '';
    const kulturColor = getFruchtFarbe(kultur).dot;
    const kulturSpan = kl
      ? `<span style="color:${kulturColor};font-size:${isBig?12:10}px;font-weight:600">${kl}</span>`
      : `<span style="color:#5a7a5a;font-size:${isBig?11:9}px">leer</span>`;
    const cntSpan = cnt ? `<br><span style="color:#5a7a5a;font-size:${isBig?10:9}px">${cnt} Fhm</span>` : '';
    // Drag handlers on outer wrapper, click handler separate via button overlay
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 4px;position:relative"
      ondragover="event.preventDefault();document.getElementById('ssvg-${s.id}').style.filter='drop-shadow(0 0 8px var(--gold))'"
      ondragleave="document.getElementById('ssvg-${s.id}').style.filter=''"
      ondrop="dropFuhreOnSilo(event,'${s.id}');document.getElementById('ssvg-${s.id}').style.filter=''">
      <button onclick="openSiloDetail('${s.id}')" style="background:none;border:none;padding:0;cursor:pointer;display:block;width:${sz}px;height:${sz}px">
        <svg id="ssvg-${s.id}" width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="transition:filter .2s;display:block">
          <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="${fillBg}" stroke="${strokeC}" stroke-width="${strokeW}"/>
          <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${fc}" stroke-width="${isBig?12:9}"
            stroke-dasharray="${sd}" transform="rotate(-90 ${sz/2} ${sz/2})" style="transition:stroke-dasharray .4s"/>
          <text x="${sz/2}" y="${sz/2-8}" text-anchor="middle" fill="#2c2c2c" font-size="${isBig?18:14}" font-weight="700" font-family="monospace">${s.id}</text>
          <text x="${sz/2}" y="${sz/2+10}" text-anchor="middle" fill="${fc}" font-size="${isBig?14:11}" font-family="monospace">${fillT.toFixed(1)}t</text>
          ${pctText}
        </svg>
      </button>
      <div style="text-align:center;max-width:${sz}px;line-height:1.5">${kulturSpan}${cntSpan}</div>
    </div>`;
  };
  // Hof-Ansicht: virtuelle Abkippfläche
  const hofFuhren = state.fuhren.filter(f=>f.siloId==='HOF'&&f.status==='fertig');
  const hofView = `<div style="display:flex;flex-direction:column;align-items:center;width:100%;padding:16px">
    <div style="width:100%;max-width:600px">
      <div style="background:#f4f8f4;border:2px dashed #5a8a3a;border-radius:12px;min-height:200px;padding:16px;margin-bottom:16px"
        ondragover="event.preventDefault();this.style.borderColor='var(--gold)'"
        ondragleave="this.style.borderColor='#4a6a2a'"
        ondrop="dropFuhreOnSilo(event,'HOF');this.style.borderColor='#4a6a2a'">
        <div style="font-size:14px;letter-spacing:1px;text-transform:uppercase;color:#5a7a3a;margin-bottom:12px">🏗 Hofplatz · Zwischenlager · ${hofFuhren.length} Fuhren · ${(hofFuhren.reduce((s,f)=>s+(netto(f)||0),0)/1000).toFixed(1)} t</div>
        ${hofFuhren.length ? hofFuhren.map(f=>{
          const n=netto(f); const fr=getFruchtFarbe(f.fruchtart);
          return `<div style="display:flex;border-radius:8px;overflow:hidden;margin-bottom:8px;background:#ffffff;border:1px solid #d8dcd8">
            <div style="width:5px;flex-shrink:0;background:${fr.dot}"></div>
            <div style="padding:10px 12px;flex:1;display:flex;align-items:center;gap:10px">
              <div style="flex:1">
                <div style="font-size:14px;font-weight:700;color:#2c2c2c">${f.fruchtart}</div>
                <div style="font-size:13px;color:#5a7a3a;font-weight:600">${n?(n/1000).toFixed(2)+' t':'–'}</div>
                <div style="font-size:12px;color:#5a7a5a">${getFeld(f.feldId).name||'–'} · ${f.feuchte??'–'}%F</div>
              </div>
              <button onclick="removeFuhreFromSilo(${f.id})" title="Vom Hof entfernen"
                style="background:none;border:1px solid #4a6a4a;color:#5a8a5a;cursor:pointer;font-size:14px;width:30px;height:30px;border-radius:6px;flex-shrink:0">✕</button>
            </div>
          </div>`;
        }).join('') : '<div style="text-align:center;padding:32px;color:#3d5a28;font-size:14px">Fuhren aus der Warteschlange hierher ziehen</div>'}
      </div>
    </div>
  </div>`;

  // B-Silos: 2+2+1 Layout
  const bColW = 170;
  const bRow = (silos) => `<div style="display:flex;gap:8px;justify-content:center">${silos.map(sc).join('')}</div>`;
  const bList = `<div style="display:flex;flex-direction:column;gap:4px;align-items:center;padding:8px">
    ${bRow(bigSilos.slice(0,2))}
    ${bRow(bigSilos.slice(2,4))}
    ${bRow(bigSilos.slice(4,5))}
  </div>`;

  // A-Silos: 3 Spalten, gleichbreite Zellen damit Silos fluchten
  const colW = 140; // px pro Spalte, größer als Silo (110px)
  const col = (arr) => `<div style="display:flex;flex-direction:column;gap:0;width:${colW}px;align-items:center">${arr.map(sc).join('')}</div>`;
  const aGrid = `<div style="display:flex;gap:8px;justify-content:center;padding:8px;align-items:flex-start">${col(smallSilos.slice(0,7))}${col(smallSilos.slice(7,14))}${col(smallSilos.slice(14,21))}</div>`;
  const fi = (f) => {
    const n = netto(f);
    const farbe = getFruchtFarbe(f.fruchtart);
    const verColor = f.verifiziert ? '#6dd98a' : '#e8c86a';
    const verIcon = f.verifiziert ? '✓' : '⏳';
    const nettoStr = n ? (n/1000).toFixed(2)+' t' : '– t';
    const datum = new Date(f.zeit).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
    const feuchteW = feuchteZuHoch(f);
    return `<div draggable="true"
      ondragstart="_dragFuhreId=${f.id};this.style.opacity='0.5'"
      ondragend="this.style.opacity='1'"
      style="display:flex;border-radius:10px;overflow:hidden;margin-bottom:10px;cursor:grab;background:${feuchteW?'rgba(239,68,68,0.06)':'#ffffff'};border:1px solid ${feuchteW?'#ef4444':'#2a3a2a'}">
      <div style="width:6px;flex-shrink:0;background:${feuchteW?'#ef4444':farbe.dot}"></div>
      <div style="padding:11px 13px;flex:1;min-width:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:16px;font-weight:700;color:#2c2c2c">${f.fruchtart}</span>
          <span style="font-size:15px;color:${verColor}">${verIcon}</span>
        </div>
        <div style="font-size:17px;font-weight:800;color:#5a7a3a;margin-bottom:4px">${nettoStr}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;color:#7a9a7a">${f.feuchte!=null?f.feuchte+'%F':''}${f.feuchte!=null&&f.protein!=null?' · ':''}${f.protein!=null?f.protein+'%P':''}</span>
          <span style="font-size:12px;color:#5a7a5a">${datum}</span>
        </div>
      </div>
    </div>`;
  };
  const el = document.getElementById('silo-overlay') || document.getElementById('silo-main');
  if(!el) return;
  const bg = (v) => view===v ? 'var(--gold)' : 'transparent';
  const cl = (v) => view===v ? '#1a1400' : 'var(--text3)';
  const capLbl = view==='B' ? '5 × 1.000 t' : view==='A' ? '21 × 300 t' : 'Hofplatz';
  const emptyMsg = totalFertig ? '✓ Alle zugeordnet' : 'Keine fertigen Fuhren';
  const queueHtml = unassigned.length ? unassigned.map(fi).join('') : `<div style="text-align:center;padding:20px 8px;color:#5a7a5a;font-size:11px">${emptyMsg}</div>`;
  el.innerHTML = `
    <div style="display:flex;flex-direction:column;height:calc(100vh - 49px);overflow:hidden">
      <div style="padding:10px 16px;border-bottom:1px solid #d8dcd8;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#ffffff">
        <div style="display:flex;align-items:center;gap:10px">
          <button onclick="setAdminTab('schlaege')" style="background:none;border:1px solid #d8dcd8;color:#5a7a5a;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:12px">← Zurück</button>
          <div style="font-family:var(--serif);font-size:16px;color:#2c2c2c">🏭 Silomanagement</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="display:flex;background:#e8ece8;border:1px solid #d8dcd8;border-radius:20px;padding:3px;gap:2px">
            <button onclick="_siloView=&quot;B&quot;;renderSiloManagement()" style="padding:8px 20px;border-radius:16px;border:none;cursor:pointer;font-family:var(--mono);font-size:15px;font-weight:700;background:${bg('B')};color:${cl('B')}">B</button>
            <button onclick="_siloView=&quot;A&quot;;renderSiloManagement()" style="padding:8px 20px;border-radius:16px;border:none;cursor:pointer;font-family:var(--mono);font-size:15px;font-weight:700;background:${bg('A')};color:${cl('A')}">A</button>
            <button onclick="_siloView=&quot;HOF&quot;;renderSiloManagement()" style="padding:8px 20px;border-radius:16px;border:none;cursor:pointer;font-family:var(--mono);font-size:15px;font-weight:700;background:${bg('HOF')};color:${cl('HOF')}">Hof</button>
          </div>
          <div style="font-size:14px;color:#5a7a5a">${capLbl}</div>
          <button class="btn btn-sm btn-outline" onclick="exportSiloCSV()">⬇ CSV</button>
        </div>
      </div>
      <div style="display:flex;flex:1;overflow:hidden">
        <div style="width:320px;flex-shrink:0;border-right:1px solid #d8dcd8;display:flex;flex-direction:column">
          <div style="padding:8px 12px;border-bottom:1px solid #d8dcd8">
            <div style="font-size:17px;font-weight:800;color:#2c2c2c">Warteschlange</div>
            <div style="font-size:14px;color:#7a9a7a">${unassigned.length} offen · ${totalAssigned}/${totalFertig} zugeordnet</div>
          </div>
          <div style="flex:1;overflow-y:auto;padding:8px">${queueHtml}</div>
        </div>
        <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:8px">
          ${view==='B' ? bList : view==='A' ? aGrid : hofView}
        </div>
        <div id="silo-detail-panel" style="width:360px;flex-shrink:0;border-left:1px solid #d8dcd8;display:flex;flex-direction:column;background:#ffffff">
          <div style="padding:14px 16px;border-bottom:1px solid #d8dcd8;font-size:16px;color:#7a9a7a;font-weight:600">← Silo anklicken</div>
          <div id="silo-detail-content" style="flex:1;overflow-y:auto;padding:12px"></div>
        </div>
      </div>
    </div>`;

  if(_activeSiloId) renderSiloDetail(_activeSiloId);
}

function openSiloDetail(siloId) {
  _activeSiloId = siloId;
  const panel = document.getElementById('silo-detail-content');
  renderSiloDetail(siloId);
  // Re-render silo circles to update active state without full re-render
  // Update active state on silo SVGs
  document.querySelectorAll('[id^="ssvg-"]').forEach(svg => {
    const id = svg.id.replace('ssvg-','');
    const circles = svg.querySelectorAll('circle');
    if(circles.length > 0) {
      circles[0].style.stroke = id===siloId ? 'var(--gold)' : '#2a422a';
      circles[0].style.strokeWidth = id===siloId ? '4' : '2';
      circles[0].style.fill = id===siloId ? '#1e321e' : '#161e16';
    }
  });
}

function renderSiloDetail(siloId) {
  const panel = document.getElementById('silo-detail-content');
  const header = document.getElementById('silo-detail-panel')?.querySelector('div');
  if(!panel) return;
  const silo = state.silos.find(s=>s.id===siloId);
  if(!silo) return;
  const assignedFuhren = state.fuhren.filter(f=>f.siloId===siloId&&f.status==='fertig').sort((a,b)=>new Date(b.zeit)-new Date(a.zeit));
  const eingangKg = getSiloFill(siloId);
  const ausgangKg = getSiloAusgang(siloId);
  const bestandKg = Math.max(0, eingangKg - ausgangKg);
  const fillT = bestandKg/1000;
  const pct = Math.min(100,(fillT/silo.kapazitaet_t)*100);
  const kultur = getSiloKultur(siloId);
  const farbe = getFruchtFarbe(kultur);
  const avg = (key) => {
    const valid = assignedFuhren.filter(f=>f[key]!=null);
    return valid.length ? (valid.reduce((s,f)=>s+(f[key]||0),0)/valid.length).toFixed(1) : null;
  };
  const avgFeuchte=avg('feuchte'), avgProtein=avg('protein'), avgHL=avg('hlGewicht'), avgFallzahl=avg('fallzahl');
  const barColor = pct>100?'#ef4444':pct>85?'#e0943a':'#4caf6e';

  const fuhreRow = (f) => {
    const n = netto(f);
    const fr = getFruchtFarbe(f.fruchtart);
    const datum = new Date(f.zeit).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
    const feuchteWarn = feuchteZuHoch(f);
    const borderColor = feuchteWarn ? '#ef4444' : '#2a3a2a';
    const bgColor = feuchteWarn ? 'rgba(239,68,68,0.08)' : '#1a2a1a';
    const stripColor = feuchteWarn ? '#ef4444' : fr.dot;
    const warnBadge = feuchteWarn ? '<span style="font-size:11px;font-weight:700;color:#ef4444;background:rgba(239,68,68,0.1);padding:2px 8px;border-radius:10px">&#9888; Feuchte zu hoch</span>' : '';
    const feuchteColor = feuchteWarn ? '#ef4444' : '#6a8a6a';
    const feuchteWeight = feuchteWarn ? '700' : '400';
    const feuchteStr = f.feuchte!=null ? '<span style="color:'+feuchteColor+';font-weight:'+feuchteWeight+'">'+f.feuchte+'%F'+(feuchteWarn?' &#9888;':'')+'</span>' : '';
    const proteinStr = f.protein!=null ? ' <span style="color:#5a7a5a">· '+f.protein+'%P</span>' : '';
    const hlStr = f.hlGewicht!=null ? ' <span style="color:#5a7a5a">· HL '+f.hlGewicht+'</span>' : '';
    return '<div style="display:flex;border-radius:8px;overflow:hidden;margin-bottom:8px;background:'+bgColor+';border:1px solid '+borderColor+'">'
      +'<div style="width:5px;flex-shrink:0;background:'+stripColor+'"></div>'
      +'<div style="padding:10px 12px;flex:1;min-width:0">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'
      +'<span style="font-size:15px;font-weight:700;color:#5a7a3a">'+(n?(n/1000).toFixed(2)+' t':'–')+'</span>'
      +warnBadge
      +'<button onclick="removeFuhreFromSilo('+f.id+')" title="Aus Silo entfernen" style="background:none;border:1px solid #4a6a4a;color:#5a8a5a;cursor:pointer;font-size:14px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0">&#x2715;</button>'
      +'</div>'
      +'<div style="font-size:13px;color:#3d5a28">'+f.fruchtart+'</div>'
      +'<div style="font-size:12px;color:#5a7a5a;margin-top:2px">'+(getFeld(f.feldId).name||'–')+' · '+datum+'</div>'
      +'<div style="font-size:12px;margin-top:1px">'+feuchteStr+proteinStr+hlStr+'</div>'
      +'</div></div>';
  };

  panel.innerHTML = `
    <div style="font-family:var(--serif);font-size:28px;font-weight:700;color:#3a3a3a;margin-bottom:2px">Silo ${siloId}</div>
    <div style="font-size:14px;margin-bottom:14px">${silo.kapazitaet_t} t${kultur?` · <span style="color:${farbe.dot};font-weight:600">${kultur}</span>`:' · <span style="color:#5a7a5a">leer</span>'}</div>
    <div style="background:#d8e8d0;border-radius:6px;height:10px;overflow:hidden;margin-bottom:6px">
      <div style="width:${Math.min(pct,100).toFixed(1)}%;height:100%;background:${barColor};border-radius:6px;transition:width .3s"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px">
      <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 10px;text-align:center">
        <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:3px">Eingang</div>
        <div style="font-size:16px;font-weight:700;color:var(--green2)">${(eingangKg/1000).toFixed(1)} t</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 10px;text-align:center">
        <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:3px">Ausgang</div>
        <div style="font-size:16px;font-weight:700;color:var(--red)">${(ausgangKg/1000).toFixed(1)} t</div>
      </div>
      <div style="background:var(--bg3);border:2px solid var(--gold);border-radius:var(--radius);padding:8px 10px;text-align:center">
        <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:3px">Bestand</div>
        <div style="font-size:16px;font-weight:700;color:#fff">${fillT.toFixed(1)} t</div>
      </div>
    </div>
    ${bestandKg > 0 ? `<button class="btn btn-amber btn-full" style="margin-bottom:16px" onclick="auslagernDialog('${siloId}')">↑ Auslagern</button>` : ''}
    <div style="font-size:12px;color:var(--text3);margin-bottom:4px;text-align:right">${pct.toFixed(0)}% belegt</div>
    ${avgFeuchte ? `
    <div style="background:#f4f8f4;border-radius:8px;padding:12px 14px;margin-bottom:16px;border:1px solid #d0dcd0">
      <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#5a7a5a;margin-bottom:10px">Ø Qualität</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><div style="font-size:11px;color:#5a7a5a;margin-bottom:2px">Feuchte</div><div style="font-size:22px;font-weight:700;color:#2c2c2c">${avgFeuchte}<span style="font-size:13px;color:#5a7a5a">%</span></div></div>
        <div><div style="font-size:11px;color:#5a7a5a;margin-bottom:2px">Protein</div><div style="font-size:22px;font-weight:700;color:#2c2c2c">${avgProtein}<span style="font-size:13px;color:#5a7a5a">%</span></div></div>
        <div><div style="font-size:11px;color:#5a7a5a;margin-bottom:2px">HL-Gewicht</div><div style="font-size:22px;font-weight:700;color:#2c2c2c">${avgHL}</div></div>
        ${avgFallzahl?`<div><div style="font-size:11px;color:#5a7a5a;margin-bottom:2px">Fallzahl</div><div style="font-size:22px;font-weight:700;color:#2c2c2c">${avgFallzahl}</div></div>`:''}
      </div>
    </div>` : ''}
    <div style="font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#5a7a5a;margin-bottom:10px">
      ${assignedFuhren.length} Fuhren · ✕ zum Entfernen
    </div>
    ${assignedFuhren.map(fuhreRow).join('')}
    ${!assignedFuhren.length?`<div style="text-align:center;padding:32px 0;color:#3d5a28;font-size:14px">Leer<br><span style="font-size:12px">Fuhre aus der Warteschlange hierher ziehen</span></div>`:''}`;
}

// ─── AUSLAGERN ───
function auslagernDialog(siloId) {
  const silo = state.silos.find(s=>s.id===siloId);
  if(!silo) return;
  const bestandKg = getSiloBestand(siloId);
  const bestandT  = (bestandKg/1000).toFixed(2);
  const kultur    = getSiloKultur(siloId);

  // Artikel-Optionen: bevorzuge passende Fruchtart, dann alle aktiven
  const aktiveArtikel = state.artikel.filter(a=>a.aktiv);
  const artOpts = aktiveArtikel.map(a => {
    const sel = kultur && a.name.toLowerCase().includes(kultur.toLowerCase()) ? ' selected' : '';
    return `<option value="${a.id}"${sel}>${a.name} (${a.einheit})</option>`;
  }).join('');

  const m = document.createElement('div');
  m.id = 'auslagern-modal';
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9500;display:flex;align-items:center;justify-content:center;padding:16px';
  m.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:100%;max-width:420px;box-shadow:var(--shadow)">
      <div style="font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text);margin-bottom:4px">↑ Auslagern</div>
      <div style="font-size:11px;color:var(--text3);letter-spacing:1px;margin-bottom:20px">Silo ${siloId} · Bestand: ${bestandT} t</div>
      <div class="form-group">
        <label>Artikel *</label>
        <select id="aus-artikel">${artOpts || '<option value="">– kein Artikel –</option>'}</select>
      </div>
      <div class="form-group">
        <label>Menge (t) *</label>
        <input type="number" id="aus-menge" min="0.001" step="0.001" max="${bestandT}" placeholder="z.B. 50.000">
      </div>
      <div class="form-group">
        <label>Empfänger</label>
        <input type="text" id="aus-empfaenger" placeholder="z.B. RWA Magdeburg">
      </div>
      <div class="form-group">
        <label>Beleg-Nr.</label>
        <input type="text" id="aus-beleg" placeholder="z.B. LS-2026-001">
      </div>
      <div class="form-group">
        <label>Notiz</label>
        <input type="text" id="aus-notiz">
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-amber" style="flex:1" onclick="auslagernSpeichern('${siloId}')">Auslagern bestätigen</button>
        <button class="btn btn-outline" onclick="document.getElementById('auslagern-modal').remove()">Abbrechen</button>
      </div>
    </div>`;
  document.body.appendChild(m);
}

async function auslagernSpeichern(siloId) {
  const artikelId = parseInt(document.getElementById('aus-artikel')?.value);
  const mengeT    = parseFloat(document.getElementById('aus-menge')?.value);
  const empfaenger= document.getElementById('aus-empfaenger')?.value.trim();
  const belegNr   = document.getElementById('aus-beleg')?.value.trim();
  const notiz     = document.getElementById('aus-notiz')?.value.trim();

  if(!artikelId || isNaN(mengeT) || mengeT <= 0) {
    showToast('⚠ Bitte Artikel und Menge angeben', 'error'); return;
  }
  const mengeKg = mengeT * 1000;
  const bestandKg = getSiloBestand(siloId);
  if(mengeKg > bestandKg + 0.01) {
    showToast('⚠ Menge überschreitet den Bestand von '+(bestandKg/1000).toFixed(2)+' t', 'error'); return;
  }

  const bewegung = { typ:'ausgang', artikelId, siloVonId: siloId, mengeKg, empfaenger, belegNr, notiz,
    erstelltVon: state.currentUser?.id || null };
  try {
    const saved = await db.insertWarenbewegung(bewegung);
    state.warenbewegungen.unshift(saved);
    document.getElementById('auslagern-modal')?.remove();
    showToast('✓ '+mengeT.toFixed(3)+' t ausgelagert');
    renderSiloDetail(siloId);
    renderSiloManagement();
  } catch(e) {
    showToast('⚠ '+e.message, 'error');
  }
}

async function deleteWarenbewegung(id) {
  if(!confirm('Warenbewegung wirklich löschen?')) return;
  try {
    await db.deleteWarenbewegung(id);
    state.warenbewegungen = state.warenbewegungen.filter(w=>w.id!==id);
    if(adminTab === 'warenausgang') renderWarenausgang();
    showToast('✓ Bewegung gelöscht');
  } catch(e) { showToast('⚠ '+e.message,'error'); }
}

async function dropFuhreOnSilo(event, siloId) {
  event.preventDefault();
  const fId = _dragFuhreId;
  if(!fId) return;
  const f = state.fuhren.find(x=>x.id===fId);
  if(!f) return;
  const silo = state.silos.find(s=>s.id===siloId);
  if(!silo && siloId !== 'HOF') return;

  // ── BIO/KONVENTIONELL SPERRE ──
  if(siloId !== 'HOF') {
    const siloStatus = getSiloBioStatus(siloId);
    const fuhreIstBio = isBioFuhre(f);
    if(siloStatus === 'bio' && !fuhreIstBio) {
      showToast('⛔ Silo '+siloId+' enthält BIO-Ware – konventionelle Fuhre nicht erlaubt!', 'error');
      return;
    }
    if(siloStatus === 'konventionell' && fuhreIstBio) {
      showToast('⛔ Silo '+siloId+' enthält konventionelle Ware – BIO-Fuhre nicht erlaubt!', 'error');
      return;
    }
  }
  // Hof: keine Kultur-Prüfung, gemischtes Lager erlaubt
  if(siloId === 'HOF') {
    f.siloId = 'HOF';
    renderSiloManagement();
    if(_activeSiloId) renderSiloDetail(_activeSiloId);
    try { await db.updateFuhre(fId, {siloId:'HOF'}); showToast(`✓ ${f.nr} → Hofplatz`); }
    catch(e) { showToast('⚠ '+e.message,'error'); }
    return;
  }

  // Silo: Kultur wird durch erste Fuhre festgelegt (inkl. Sorte für Vermehrung)
  const siloKultur = getSiloKultur(siloId);
  const fuhreKulturKey = getFuhreKulturKey(f);
  if(siloKultur && siloKultur !== fuhreKulturKey) {
    showToast(`⚠ Silo ${siloId} enthält ${siloKultur} – keine andere Kultur/Sorte möglich`, 'error');
    return;
  }

  // Wenn Fuhre schon in anderem Silo war: altes Silo Kultur prüfen
  if(f.siloId && f.siloId !== siloId && f.siloId !== 'HOF') {
    const oldSilo = state.silos.find(s=>s.id===f.siloId);
    if(oldSilo) {
      const oldRemaining = state.fuhren.filter(x=>x.siloId===f.siloId&&x.status==='fertig'&&x.id!==fId);
      if(oldRemaining.length === 0) { oldSilo.fruchtart = null; try { await db.updateSilo(f.siloId, {fruchtart:null}); } catch(e) {} }
    }
  }
  const isFirst = !siloKultur;
  const previousSiloId = f.siloId;
  f.siloId = siloId;
  if(isFirst) {
    silo.fruchtart = fuhreKulturKey;
    try { await db.updateSilo(siloId, {fruchtart: fuhreKulturKey}); } catch(e) {}
  }

  renderSiloManagement();
  try {
    await db.updateFuhre(fId, {siloId});
    showToast(`✓ ${f.nr} → Silo ${siloId}${isFirst?' (Kultur festgelegt: '+fuhreKulturKey+')':''}`);
  } catch(e) { f.siloId = previousSiloId; showToast('⚠ '+e.message,'error'); }
}

async function removeFuhreFromSilo(fId) {
  const f = state.fuhren.find(x=>x.id===fId);
  if(!f) return;
  const previousSiloId = f.siloId;
  f.siloId = null;
  // Nur für echte Silos: Kultur zurücksetzen wenn leer
  if(previousSiloId !== 'HOF') {
    const silo = state.silos.find(s=>s.id===previousSiloId);
    const remaining = state.fuhren.filter(x=>x.siloId===previousSiloId&&x.status==='fertig');
    if(silo && remaining.length === 0) {
      silo.fruchtart = null;
      try { await db.updateSilo(previousSiloId, {fruchtart: null}); } catch(e) {}
    }
  }
  renderSiloManagement();
  if(_activeSiloId) renderSiloDetail(_activeSiloId);
  try { await db.updateFuhre(fId, {siloId: null}); showToast('✓ Fuhre wieder in Warteschlange'); }
  catch(e) { f.siloId = previousSiloId; showToast('⚠ '+e.message,'error'); renderSiloManagement(); }
}

function renderWarenausgang() {
  const offen = state.lieferungen.filter(l=>l.status==='offen');
  const abg   = state.lieferungen.filter(l=>l.status==='abgeschlossen');
  const nettoT = abg.reduce((s,l)=>s+(l.vollgewicht&&l.leergewicht?l.vollgewicht-l.leergewicht:0),0)/1000;
  const lRow = (l) => {
    const n = (l.vollgewicht&&l.leergewicht) ? ((l.vollgewicht-l.leergewicht)/1000).toFixed(2)+' t' : '–';
    const isOffen = l.status==='offen';
    const bc = isOffen ? 'var(--amber)' : 'var(--border)';
    return '<div class="card" style="margin-bottom:10px;border-color:'+bc+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">'
      +'<div><div style="font-size:13px;font-weight:700;color:var(--text)">'+l.nr+' · '+new Date(l.datum).toLocaleDateString('de-DE')+'</div>'
      +'<div style="font-size:12px;color:#5a7a5a;margin-top:2px">'+l.kaeufer_name+(l.kennzeichen?' · '+l.kennzeichen:'')+'</div>'
      +'<div style="font-size:12px;color:#5a7a5a">'+l.fruchtart+'</div></div>'
      +'<div style="text-align:right;flex-shrink:0"><div style="font-size:16px;font-weight:700;color:#2c2c2c">'+n+'</div>'
      +'<span class="badge badge-'+(isOffen?'offen':'fertig')+'">'+(isOffen?'OFFEN':'FERTIG')+'</span></div></div>'
      +'<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">'

      +'<button class="btn btn-sm btn-outline" onclick="lieferungPDF('+l.id+')">📄 Lieferschein</button>'
      +'</div></div>';
  };
  // Warenbewegungen (direkte Auslagerungen)
  const bewegungen = state.warenbewegungen.filter(w=>w.typ==='ausgang');
  const bewegungT  = bewegungen.reduce((s,w)=>s+(w.menge_kg||0),0)/1000;
  const bRow = (w) => {
    const art = state.artikel.find(a=>a.id===w.artikel_id);

      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'

      +'<div style="text-align:right;flex-shrink:0">'
      +'<div style="font-size:15px;font-weight:700;color:var(--gold)">'+mT+' t</div>'
      +'<div style="font-size:10px;color:var(--text3)">'+datum+'</div>'

      +'</div></div></div>';

    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex:1;min-width:240px">'
    +'<div class="stat-box"><div class="stat-val" style="font-size:22px;color:var(--amber)">'+offen.length+'</div><div class="stat-label">Lieferungen offen</div></div>'
    +'<div class="stat-box"><div class="stat-val" style="font-size:22px;color:var(--green2)">'+abg.length+'</div><div class="stat-label">Lieferungen fertig</div></div>'
    +'<div class="stat-box"><div class="stat-val" style="font-size:18px;color:var(--text)">'+(nettoT+bewegungT).toFixed(1)+'</div><div class="stat-label">t gesamt ausgelagert</div></div>'

function renderArtikel() {
  const kategorien = ['getreide','betriebsmittel','saatgut','sonstige'];
  const katLabel = { getreide:'Getreide / Druschfrüchte', betriebsmittel:'Betriebsmittel', saatgut:'Saatgut', sonstige:'Sonstige' };
  const artRow = (a) =>
    `<div class="card" style="margin-bottom:6px;opacity:${a.aktiv?1:0.5}">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <div style="flex:1">
          <div style="font-weight:600;color:var(--text)">${escapeHtml(a.name)}</div>
          <div style="font-size:11px;color:var(--text3);">${a.einheit} · ${katLabel[a.kategorie]||a.kategorie}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-sm btn-outline" onclick="artikelEditDialog(${a.id})">✏</button>
          <button class="btn btn-sm" style="background:none;border:1px solid var(--border2);color:${a.aktiv?'var(--red)':'var(--green)'}" onclick="artikelToggleAktiv(${a.id})">${a.aktiv?'Deaktivieren':'Aktivieren'}</button>
        </div>
      </div>
    </div>`;

  let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    +'<div class="stat-box" style="flex:1;margin-right:8px"><div class="stat-val" style="font-size:22px">'+state.artikel.filter(a=>a.aktiv).length+'</div><div class="stat-label">aktive Artikel</div></div>'
    +'<button class="btn btn-primary" onclick="artikelNeuDialog()">+ Neuer Artikel</button>'
    +'</div>';

  for(const kat of kategorien) {
    const gruppe = state.artikel.filter(a=>a.kategorie===kat);
    if(!gruppe.length) continue;
    html += `<div class="section-label" style="margin-bottom:8px">${katLabel[kat]} (${gruppe.length})</div>`;
    html += gruppe.map(artRow).join('');
  }
  if(!state.artikel.length) html += '<div class="empty-state">Keine Artikel angelegt.</div>';
  document.getElementById('admintab').innerHTML = html;
}

async function artikelSpeichern(id) {
  const name     = document.getElementById('art-name')?.value.trim();
  const einheit  = document.getElementById('art-einheit')?.value;
  const kategorie= document.getElementById('art-kategorie')?.value;
  if(!name) { showToast('⚠ Name erforderlich','error'); return; }
  try {
    if(id) {
      const a = state.artikel.find(x=>x.id===id);
      await db.updateArtikel({...a, name, einheit, kategorie});
      Object.assign(a, {name, einheit, kategorie});

// ── OAuth State für Callback ──
function jdLogin() {
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('jd_oauth_state', state);
  const params = new URLSearchParams({
    client_id: JD_CLIENT_ID,
    response_type: 'code',
    redirect_uri: JD_REDIRECT_URI,
    scope: JD_SCOPES,
    state
  });
  sessionStorage.setItem('jd_return_tab', adminTab || 'jdlink');
  window.location.href = JD_AUTH_URL + '?' + params.toString();
}

async function jdExchangeCode(code) {
  const body = new URLSearchParams({
    grant_type: 'authorization_code',
    code,
    redirect_uri: JD_REDIRECT_URI,
    client_id: JD_CLIENT_ID,
    client_secret: JD_CLIENT_SECRET
  });
  const res = await fetch(JD_TOKEN_URL, {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body
  });
  if(!res.ok) throw new Error('Token-Austausch fehlgeschlagen: ' + res.status);
  const tokens = await res.json();
  _jdTokens = tokens;
  // In Supabase speichern
  await sb.from('jd_tokens').upsert({
    user_id: state.currentUser.id,
    access_token: tokens.access_token,
    refresh_token: tokens.refresh_token,
    expires_at: new Date(Date.now() + tokens.expires_in * 1000).toISOString()
  }, {onConflict:'user_id'}).catch(()=>{});
  return tokens;
}

async function jdRefreshToken() {
  if(!_jdTokens?.refresh_token) return null;
  const body = new URLSearchParams({
    grant_type: 'refresh_token',
    refresh_token: _jdTokens.refresh_token,
    client_id: JD_CLIENT_ID,
    client_secret: JD_CLIENT_SECRET
  });
  const res = await fetch(JD_TOKEN_URL, {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body});
  if(!res.ok) { _jdTokens = null; return null; }
  const tokens = await res.json();
  _jdTokens = {..._jdTokens, ...tokens};
  await sb.from('jd_tokens').upsert({
    user_id: state.currentUser.id,
    access_token: tokens.access_token,
    refresh_token: tokens.refresh_token || _jdTokens.refresh_token,
    expires_at: new Date(Date.now() + tokens.expires_in * 1000).toISOString()
  }, {onConflict:'user_id'}).catch(()=>{});
  return tokens;
}

async function jdFetch(url, retry=true) {
  if(!_jdTokens) return null;
  const expiresAt = _jdTokens.expires_at ? new Date(_jdTokens.expires_at) : null;
  if(expiresAt && expiresAt < new Date(Date.now() + 60000)) {
    await jdRefreshToken();
  }
  const res = await fetch(url.startsWith('http') ? url : JD_API_BASE + url, {
    headers: {
      'Authorization': 'Bearer ' + _jdTokens.access_token,
      'Accept': 'application/vnd.deere.axiom.v3+json'
    }
  });
  if(res.status === 401 && retry) {
    await jdRefreshToken();
    return jdFetch(url, false);
  }
  if(!res.ok) return null;
  return res.json();
}

        refresh_token: data.refresh_token,

      };

async function jdLoadMachines() {
  // 1. Organisations holen
  const orgsData = await jdFetch('/organizations');
  if(!orgsData) return [];
  const orgs = orgsData.values || [];
  const machines = [];
  for(const org of orgs) {
    const orgId = org.id;
    // 2. Machines der Organisation
    const machData = await jdFetch(`/organizations/${orgId}/machines`);
    if(!machData) continue;
    const mList = machData.values || [];
    for(const m of mList) {
      const type = (m.category||'').toLowerCase();
      if(type.includes('tractor') || type.includes('combine') || type.includes('harvester')) {
        machines.push({
          id: m.id,
          name: m.name || m.visualId || 'Unbekannt',
          type: type.includes('combine')||type.includes('harvester') ? 'combine' : 'tractor',
          orgId,
          serialNumber: m.serialNumber || '',
          model: m.modelYear ? m.modelYear + ' ' + (m.model||'') : (m.model||''),
        });
      }
    }
  }
  _jdMachines = machines;
  return machines;
}

async function jdGetMachineLocation(machine) {
  const data = await jdFetch(`/organizations/${machine.orgId}/machines/${machine.id}/locations`);
  if(!data || !data.values || !data.values[0]) return null;
  const loc = data.values[0];
  const point = loc.geometry;
  if(!point || !point.coordinates) return null;
  return {
    lat: point.coordinates[1],
    lon: point.coordinates[0],
    speed: loc.measurement?.find(m=>m.type==='Machine Speed')?.value || null,
    fuel: loc.measurement?.find(m=>m.type==='Fuel Used Accumulation')?.value || null,
    engineHours: loc.measurement?.find(m=>m.type==='Engine Hours')?.value || null,
    timestamp: loc.timestamp
  };
}

async function jdPollLocations() {
  if(!_jdTokens || !_jdMap) return;
  for(const machine of _jdMachines) {
    const loc = await jdGetMachineLocation(machine);
    if(!loc) continue;
    const icon = L.divIcon({
      className: '',
      html: machine.type === 'combine'
        ? '<div style="font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">🌾</div>'
        : '<div style="font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">🚜</div>',
      iconSize: [32,32], iconAnchor: [16,16]
    });
    const popup = `<div style="font-family:var(--mono);min-width:180px">
      <div style="font-weight:700;font-size:13px">${machine.name}</div>
      <div style="color:#9ca3af;font-size:11px;margin:2px 0 8px">${machine.model}</div>
      ${loc.speed!=null?`<div style="font-size:12px">⚡ ${loc.speed} km/h</div>`:''}
      ${loc.engineHours!=null?`<div style="font-size:12px">⏱ ${parseFloat(loc.engineHours).toFixed(0)} Mh</div>`:''}
      ${loc.fuel!=null?`<div style="font-size:12px">⛽ ${parseFloat(loc.fuel).toFixed(0)} L</div>`:''}
      <div style="font-size:10px;color:#6b7280;margin-top:6px">${new Date(loc.timestamp).toLocaleTimeString('de-DE')}</div>
    </div>`;
    if(_jdMarkers[machine.id]) {
      _jdMarkers[machine.id].setLatLng([loc.lat, loc.lon]);
      _jdMarkers[machine.id].setPopupContent(popup);
    } else {
      const marker = L.marker([loc.lat, loc.lon], {icon, zIndexOffset:2000});
      marker.bindPopup(popup, {className:'driver-popup', maxWidth:220});
      marker.addTo(_jdMap);
      _jdMarkers[machine.id] = marker;
    }
  }
  // Update machine list
  const listEl = document.getElementById('jd-machine-list');
  if(listEl) renderJDMachineList();
}

function renderJDMachineList() {
  const el = document.getElementById('jd-machine-list');
  if(!el) return;
  if(!_jdMachines.length) {
    el.innerHTML = '<div style="color:#5a7a5a;font-size:12px;padding:12px">Keine Schlepper/Drescher gefunden</div>';

function initJDMap() {
  if(_jdMap) { _jdMap.remove(); _jdMap = null; _jdMarkers = {}; }
  const container = document.getElementById('jd-map-container');
  if(!container) return;
  const map = L.map('jd-map-container', {center:[51.495,11.673], zoom:11});
  _jdMap = map;
  const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19});
  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19});
  sat.addTo(map);
  L.control.layers({'Satellit':sat,'OSM':osm},{},{position:'topleft'}).addTo(map);
  // Schlaggrenzen als Hintergrund
  const shapes = state.shapes.length ? state.shapes : GEO_DATA;
  shapes.forEach(entry => {
    const feld = state.felder.find(x=>x.id===entry.feldId);
    if(!feld) return;
    L.polygon([entry.outer,...(entry.holes||[])], {...schlagColor(feld.status), interactive:false, opacity:0.5, fillOpacity:0.15}).addTo(map);
  });
  // Erste Positionsabfrage
  jdPollLocations();
  // Poll alle 30s
  if(_jdPollTimer) clearInterval(_jdPollTimer);
  _jdPollTimer = setInterval(jdPollLocations, 30000);
}

let _obStep = 0;
let _obRole = null;

function showOnboarding(role) {
  _obRole = role;
  _obStep = 0;
  renderOnboardingStep();
}

function renderOnboardingStep() {
  const steps = OB_STEPS[_obRole];
  if(!steps) return;
  const step = steps[_obStep];
  const total = steps.length;
  const pct = ((_obStep + 1) / total * 100).toFixed(0);
  const isLast = _obStep === total - 1;
  const isFirst = _obStep === 0;

  const stepsHtml = step.steps.map((s, i) =>
    `<div class="ob-step" style="animation-delay:${i * 0.08}s">
      <div class="ob-step-icon">${s.icon}</div>
      <div class="ob-step-text">
        <div class="ob-step-title">${s.title}</div>
        <div class="ob-step-desc">${s.desc}</div>
      </div>
    </div>`
  ).join('');

  const dotsHtml = steps.map((_, i) =>
    `<div class="ob-dot ${i === _obStep ? 'active' : ''}"></div>`
  ).join('');

  // Remove existing overlay
  document.getElementById('onboarding-overlay')?.remove();

  const overlay = document.createElement('div');
  overlay.id = 'onboarding-overlay';
  overlay.innerHTML = `
    <div id="onboarding-card">
      <div class="ob-progress">
        <div class="ob-progress-bar" style="width:${pct}%"></div>
      </div>
      <div class="ob-header">
        <span class="ob-icon">${step.icon}</span>
        <div class="ob-title">${step.title}</div>
        <div class="ob-subtitle">${step.subtitle}</div>
      </div>
      <div class="ob-body">${stepsHtml}</div>
      <div class="ob-footer">
        <div class="ob-dots">${dotsHtml}</div>
        <div style="display:flex;gap:8px">
          ${!isFirst ? `<button class="btn btn-outline btn-sm" onclick="obPrev()">← Zurück</button>` : ''}
          ${!isLast
            ? `<button class="btn btn-primary btn-sm" onclick="obNext()">Weiter →</button>`
            : `<button class="btn btn-sm" style="background:var(--green);color:#2c2c2c;border:none;font-weight:700" onclick="closeOnboarding()">Los geht's! 🌾</button>`
          }
        </div>
      </div>
      <div style="text-align:center;padding-bottom:14px">
        <button onclick="closeOnboarding()" style="background:none;border:none;color:#5a7a5a;cursor:pointer;font-size:11px">Überspringen</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function obNext() {
  const steps = OB_STEPS[_obRole];
  if(_obStep < steps.length - 1) { _obStep++; renderOnboardingStep(); }
}
function obPrev() {
  if(_obStep > 0) { _obStep--; renderOnboardingStep(); }
}
function closeOnboarding() {
  const overlay = document.getElementById('onboarding-overlay');
  if(overlay) {
    overlay.style.animation = 'ob-fade-in 0.2s ease reverse forwards';
    setTimeout(() => overlay.remove(), 200);
  }
  // Mark as seen
  localStorage.setItem('ob_seen_' + _obRole, '1');
}

function checkShowOnboarding(role) {
  if(role === 'drescher' || role === 'abfahrer') {
    if(!localStorage.getItem('ob_seen_' + role)) {
      setTimeout(() => showOnboarding(role), 800);
    }
  }
}

async function erntejahrExcelImport(input) {
  const file = input.files[0];
  if(!file) return;
  const statusEl = document.getElementById('excel-status');
  statusEl.textContent = 'Lese Datei…';
  statusEl.style.color = 'var(--text3)';
  try {
    if(!window.XLSX) {
      await new Promise((res,rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload=res; s.onerror=rej; document.head.appendChild(s);
      });
    }
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    let ws=null, sheetName='';
    for(const name of wb.SheetNames) {
      const s=wb.Sheets[name];
      const range=XLSX.utils.decode_range(s['!ref']||'A1:A1');
      if(range.e.r>2){ws=s;sheetName=name;break;}
    }
    if(!ws) throw new Error('Kein passendes Blatt gefunden');
    const rows = XLSX.utils.sheet_to_json(ws,{defval:''});
    statusEl.textContent = `${rows.length} Zeilen in "${sheetName}" gefunden…`;

    const norm = s => s.toString().toLowerCase().replace(/[^a-z0-9]/g,'');
    const get = (row,candidates) => {
      for(const c of candidates){const k=Object.keys(row).find(k=>norm(k).includes(norm(c)));if(k&&row[k])return row[k].toString().trim();}
      return '';
    };
    const ernteCode=[112,113,115,116,131,156,171,210,311,320,330,603];
    const mapped=[];
    for(const row of rows){
      const name=get(row,['bezeichnung','name','schlag']);
      const flaeche=parseFloat(get(row,['aktflaeche','aktfläche','flaeche','fläche']).replace(',','.'));
      const fruchtart=get(row,['beschreibung','fruchtart','nutzung','kultur']);
      const nutzcode=parseInt(get(row,['nutz_code','nutzcode','code'])||'0');
      if(name&&flaeche>0&&fruchtart&&(ernteCode.includes(nutzcode)||nutzcode===0))
        mapped.push({name,flaeche:Math.round(flaeche*10000)/10000,fruchtart});
    }
    if(mapped.length===0) throw new Error('Keine Schläge gefunden – Spalten BEZEICHNUNG, FLAECHE, FRUCHTART vorhanden?');
    statusEl.textContent = `${mapped.length} Schläge gefunden. Aktualisiere Datenbank…`;

    const normName = s => s.toLowerCase().replace(/[äöüß]/g,c=>({ä:'ae',ö:'oe',ü:'ue',ß:'ss'}[c]||c)).replace(/[^a-z0-9]/g,'');
    let updated=0,added=0,errors=0;
    for(const m of mapped){
      const existing=state.felder.find(f=>normName(f.name)===normName(m.name));
      if(existing){
        existing.flaeche=m.flaeche; existing.fruchtart=m.fruchtart; existing.status='inaktiv';
        try{await sb.from('felder').update({flaeche:m.flaeche,fruchtart:m.fruchtart,status:'inaktiv'}).eq('id',existing.id);updated++;}
        catch(e){errors++;}
      } else {
        try{
          const{data}=await sb.from('felder').insert({name:m.name,flaeche:m.flaeche,fruchtart:m.fruchtart,status:'inaktiv'}).select().single();
          if(data){state.felder.push({id:data.id,...m,status:'inaktiv'});added++;}
        }catch(e){errors++;}
      }
    }
    statusEl.style.color='var(--green)';
    statusEl.textContent=`✓ ${updated} aktualisiert · ${added} neu angelegt${errors?' · '+errors+' Fehler':''}`;
    _erntejahrStep=2;
    renderNeuesErntejahr();
  } catch(e) {
    statusEl.style.color='var(--red)';
    statusEl.textContent='⚠ '+e.message;
  }
}

async function erntejahrKMLImport(input) {
  const files=Array.from(input.files);
  if(!files.length) return;
  const statusEl=document.getElementById('kml-status');
  statusEl.textContent=`${files.length} Dateien werden verarbeitet…`;
  statusEl.style.color='var(--text3)';
  const norm=s=>{const n=s.normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9/]/g,'');return n;};
  const cons=s=>norm(s).replace(/[aeiou]/g,'');
  let matched=0,skipped=0;
  const parser=new DOMParser();
  for(const file of files){
    const betrieb=file.name.replace('Parzellen_','').replace('.kml','').replace(/_/g,' ');
    const doc=parser.parseFromString(await file.text(),'text/xml');
    for(const pm of doc.querySelectorAll('Placemark')){
      const name=pm.querySelector('name')?.textContent?.trim()||'';
      const coordsEl=pm.querySelector('outerBoundaryIs coordinates');
      if(!name||!coordsEl) continue;
      const outer=coordsEl.textContent.trim().split(/\s+/).map(pt=>{const p=pt.split(',');return p.length>=2?[Math.round(parseFloat(p[1])*100000)/100000,Math.round(parseFloat(p[0])*100000)/100000]:null;}).filter(Boolean);
      if(outer.length<3) continue;
      const holes=[];
      pm.querySelectorAll('innerBoundaryIs coordinates').forEach(el=>{
        const h=el.textContent.trim().split(/\s+/).map(pt=>{const p=pt.split(',');return p.length>=2?[Math.round(parseFloat(p[1])*100000)/100000,Math.round(parseFloat(p[0])*100000)/100000]:null;}).filter(Boolean);
        if(h.length>=3)holes.push(h);
      });
      const feld=state.felder.find(f=>cons(f.name)===cons(name))||state.felder.find(f=>norm(f.name)===norm(name));
      if(!feld){skipped++;continue;}
      const ex=state.shapes.find(s=>s.feldId===feld.id);
      if(ex){ex.outer=outer;ex.holes=holes;ex.betrieb=betrieb;}
      else state.shapes.push({feldId:feld.id,betrieb,outer,holes});
      try{await db.upsertShape(feld.id,betrieb,outer,holes);matched++;}catch(e){skipped++;}
    }
  }
  if(_mapInstance){_mapInstance.remove();_mapInstance=null;_schlagLayers={};}
  if(_drescherMap){_drescherMap.remove();_drescherMap=null;}
  statusEl.style.color=matched>0?'var(--green)':'var(--amber)';
  statusEl.textContent=`✓ ${matched} Schläge aktualisiert${skipped?' · '+skipped+' nicht gefunden':''}`;
  _erntejahrStep=3;
  renderNeuesErntejahr();
}

function exportTagesbericht() {
  const heute = new Date();
  const datumStr = heute.toLocaleDateString('de-DE', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  const datumKurz = heute.toLocaleDateString('de-DE');

  // ── Daten aufbereiten ──
  const fertig = state.fuhren.filter(f=>f.status==='fertig');
  const heuteFuhren = fertig.filter(f=>{
    const d = new Date(f.zeit);
    return d.toLocaleDateString('de-DE') === datumKurz;
  });
  const gesamtHa = state.felder.reduce((s,f)=>s+f.flaeche,0);
  const abgHa    = state.felder.filter(f=>f.status==='abgeerntet').reduce((s,f)=>s+f.flaeche,0);
  const aktivHa  = state.felder.filter(f=>f.status==='aktiv').reduce((s,f)=>s+f.flaeche,0);
  const gesamtT  = fertig.reduce((s,f)=>s+(netto(f)||0),0)/1000;

  // ── Kulturen-Statistik (gesamt) ──
  const kulturen = {};
  state.felder.forEach(f=>{
    if(!kulturen[f.fruchtart]) kulturen[f.fruchtart]={ha_gesamt:0,ha_abg:0,ha_aktiv:0,kg:0,fuhren:[],feuchten:[],proteine:[],hls:[]};
    kulturen[f.fruchtart].ha_gesamt+=f.flaeche;
    if(f.status==='abgeerntet') kulturen[f.fruchtart].ha_abg+=f.flaeche;
    if(f.status==='aktiv') kulturen[f.fruchtart].ha_aktiv+=f.flaeche;
  });
  fertig.forEach(f=>{
    const fa=f.fruchtart||'Unbekannt';
    if(!kulturen[fa]) kulturen[fa]={ha_gesamt:0,ha_abg:0,ha_aktiv:0,kg:0,fuhren:[],feuchten:[],proteine:[],hls:[]};
    kulturen[fa].kg+=(netto(f)||0);
    kulturen[fa].fuhren.push(f);
    if(f.feuchte) kulturen[fa].feuchten.push(f.feuchte);
    if(f.protein) kulturen[fa].proteine.push(f.protein);
    if(f.hlGewicht) kulturen[fa].hls.push(f.hlGewicht);
  });

  const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : '–';

  // ── Heute abgeschlossene Schläge ──
  const heuteSchlaegeIds = [...new Set(heuteFuhren.map(f=>f.feldId))];
  const heuteSchlaege = state.felder.filter(f=>
    f.status==='abgeerntet' && heuteSchlaegeIds.includes(f.id)
  );

  // ── HTML für Print ──
  const kulturRows = Object.entries(kulturen)
    .filter(([,k])=>k.kg>0||k.ha_abg>0)
    .sort((a,b)=>b[1].kg-a[1].kg)
    .map(([fa,k])=>{
      const pct = k.ha_gesamt>0?(k.ha_abg/k.ha_gesamt*100):0;
      const dtHa = k.ha_abg>0?(k.kg/100/k.ha_abg).toFixed(1):'–';
      const ha_offen = Math.max(0,k.ha_gesamt-k.ha_abg-k.ha_aktiv);
      return `<tr>
        <td>${fa}</td>
        <td class="num">${k.ha_gesamt.toFixed(1)}</td>
        <td class="num green">${k.ha_abg.toFixed(1)}</td>
        <td class="num">${ha_offen.toFixed(1)}</td>
        <td class="num bold">${(k.kg/1000).toFixed(1)}</td>
        <td class="num">${dtHa}</td>
        <td class="num">${avg(k.feuchten)}</td>
        <td class="num">${avg(k.proteine)}</td>
        <td class="num">${avg(k.hls)}</td>
        <td class="num">${pct.toFixed(0)}%</td>
      </tr>`;
    }).join('');

  const schlagRows = heuteSchlaege.length ? heuteSchlaege.map(f=>{
    const fuhren = fertig.filter(x=>x.feldId===f.id);
    const totalKg = fuhren.reduce((s,x)=>s+(netto(x)||0),0);
    const avgF = avg(fuhren.filter(x=>x.feuchte).map(x=>x.feuchte));
    const avgP = avg(fuhren.filter(x=>x.protein).map(x=>x.protein));
    return `<tr>
      <td>${f.name}</td>
      <td>${f.fruchtart}</td>
      <td class="num">${f.flaeche.toFixed(2)}</td>
      <td class="num bold">${(totalKg/1000).toFixed(2)}</td>
      <td class="num">${totalKg>0&&f.flaeche>0?(totalKg/100/f.flaeche).toFixed(1):'–'}</td>
      <td class="num">${fuhren.length}</td>
      <td class="num">${avgF}</td>
      <td class="num">${avgP}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="8" style="text-align:center;color:#888;padding:16px">Keine Schläge heute abgeschlossen</td></tr>';

  const heuteFuhrenRows = heuteFuhren.sort((a,b)=>new Date(a.zeit)-new Date(b.zeit)).map(f=>{
    const n=netto(f);
    return `<tr>
      <td>${f.nr}</td>
      <td>${new Date(f.zeit).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</td>
      <td>${getFeld(f.feldId).name}</td>
      <td>${f.fruchtart}</td>
      <td>${getUser(f.drescherId).name}</td>
      <td>${getUser(f.abfahrerId).name}</td>
      <td class="num bold">${n?(n/1000).toFixed(2):'–'}</td>
      <td class="num">${f.feuchte??'–'}</td>
      <td class="num">${f.protein??'–'}</td>
      <td class="num">${f.hlGewicht??'–'}</td>
      <td>${f.siloId||'–'}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="11" style="text-align:center;color:#888;padding:16px">Keine Fuhren heute</td></tr>';

  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="de"><head>
  <meta charset="UTF-8">
  <title>Ernte 2026 – Tagesbericht ${datumKurz}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; color: #1a1a1a; background: #fff; padding: 20px 24px; }
    h1 { font-size: 20px; font-weight: 700; color: #1a3a1a; margin-bottom: 2px; }
    .subtitle { font-size: 12px; color: #555; margin-bottom: 20px; }
    h2 { font-size: 13px; font-weight: 700; color: #1a3a1a; margin: 20px 0 8px; border-bottom: 2px solid #2d6a2d; padding-bottom: 4px; }
    .kacheln { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 20px; }
    .kachel { background: #f4f9f4; border: 1px solid #c8e0c8; border-radius: 8px; padding: 10px 12px; }
    .kachel-val { font-size: 22px; font-weight: 700; color: #1a5a1a; line-height: 1; }
    .kachel-lbl { font-size: 10px; color: #555; margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    th { background: #1a3a1a; color: #fff; padding: 6px 8px; text-align: left; font-size: 10px; font-weight: 600; }
    td { padding: 5px 8px; border-bottom: 1px solid #e8f0e8; vertical-align: top; }
    tr:nth-child(even) td { background: #f8fbf8; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .bold { font-weight: 700; }
    .green { color: #1a6a1a; font-weight: 600; }
    .fortschritt { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .bar-wrap { flex: 1; background: #e8f0e8; border-radius: 6px; height: 14px; overflow: hidden; }
    .bar-abg { height: 100%; background: #2d6a2d; border-radius: 6px; display: inline-block; }

    .footer { margin-top: 24px; padding-top: 10px; border-top: 1px solid #ddd; font-size: 10px; color: #888; display: flex; justify-content: space-between; }

  </head><body>

  <div class="kacheln">

      f.vollgewicht||'',f.leergewicht||'',n||'',n?(n/1000).toFixed(3):'',
      f.feuchte||'',f.fallzahl||'',f.protein||'',f.hlGewicht||'',f.status,
      f.verifiziert?'Ja':'Nein',f.siloId||''].join(';');
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+[h.join(';'),...rows].join('\n')],{type:'text/csv;charset=utf-8'}));
  a.download='Ernte2026_Export.csv';a.click();
}

function exportSiloCSV() {
  const avg = (arr,key) => {
    const valid = arr.filter(f=>f[key]!=null);
    return valid.length ? (valid.reduce((s,f)=>s+(f[key]||0),0)/valid.length).toFixed(1) : '';
  };
  // Summary sheet
  const h=['Silo','Kapazitaet_t','Kultur','Befuellt_t','Auslastung_%','Fuhren','Ø_Feuchte_%','Ø_Protein_%','Ø_HL_Gew','Ø_Fallzahl'];
  const siloRows = state.silos.sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true})).map(s=>{
    const fuhren = state.fuhren.filter(f=>f.siloId===s.id&&f.status==='fertig');
    const fillT = (getSiloFill(s.id)/1000).toFixed(2);
    const pct = (getSiloFill(s.id)/1000/s.kapazitaet_t*100).toFixed(1);
    return [s.id,s.kapazitaet_t,getSiloKultur(s.id)||'',fillT,pct,fuhren.length,
      avg(fuhren,'feuchte'),avg(fuhren,'protein'),avg(fuhren,'hlGewicht'),avg(fuhren,'fallzahl')].join(';');
  });
  // Detail rows
  const lines = [h.join(';'), ...siloRows, '', 'FUHREN JE SILO','Nr;Datum;Schlag;Fruchtart;Netto_t;Feuchte;Protein;HL_Gew;Fallzahl;Silo'];
  state.silos.sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true})).forEach(s=>{
    const fuhren = state.fuhren.filter(f=>f.siloId===s.id&&f.status==='fertig').sort((a,b)=>new Date(a.zeit)-new Date(b.zeit));
    if(!fuhren.length) return;
    lines.push('=== Silo '+s.id+' ('+( getSiloKultur(s.id)||'leer')+') ===');
    fuhren.forEach(f=>{
      const n=netto(f);
      lines.push([f.nr,new Date(f.zeit).toLocaleDateString('de-DE'),getFeld(f.feldId).name||'',
        f.fruchtart||'',n?(n/1000).toFixed(3):'',f.feuchte||'',f.protein||'',f.hlGewicht||'',f.fallzahl||'',s.id].join(';'));
    });
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'}));
  a.download='Ernte2026_Silos.csv';a.click();
}


// Warte bis Supabase SDK geladen ist, dann initialisieren
function initSupabase() {
  if(typeof supabase !== 'undefined' && supabase.createClient) {
    sb = supabase.createClient(SB_URL, SB_KEY);
    bootApp();
  } else {
    setTimeout(initSupabase, 50);
  }
}
// Handle JD OAuth callback immediately on page load
(async () => {
  const up = new URLSearchParams(window.location.search);
  const code = up.get('code');
  const st = up.get('state');
  if(code && st && st === sessionStorage.getItem('jd_oauth_state')) {
    // Store code for processing after app boots
    sessionStorage.setItem('jd_pending_code', code);
    sessionStorage.setItem('jd_pending_state', st);
    // Clean URL immediately
    window.history.replaceState({}, '', window.location.pathname);
  }
})();
initSupabase();

if('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'ernte2026-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', location.href])));
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
